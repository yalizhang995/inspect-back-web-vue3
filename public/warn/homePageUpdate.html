<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页未更新</title>
    <script src="https://cdn.tailwindcss.com/3.3.3"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.6/lib/theme-chalk/index.css">
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui@2.4.11/lib/index.js"></script>
    <style>
        #app{
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            
        }
        .main{
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* 在iOS上启用平滑滚动 */
        }
        ul{
            margin-bottom: 20px;
        }
        li{
            background: #ffffff;
            padding-top: 10px;
            margin-top: 15px;
        }
        .d1{
            color: #000000;
            font-weight: 500;
            font-size: 17px;
            padding: 0 15px;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2; /* 限制文本显示为2行 */
            overflow: hidden;
        }
        .d2{
            color: #606266;
            margin: 5px 0;
            padding: 0 15px;
            display: flex;
        }
        .d3{
            display: flex;
            align-items: center;
            border-top: 1px solid #DCDFE6;
            padding: 10px 15px;
            margin-top: 10px;
        }
        .icon{
            width: 25px;
            margin-right: 5px;
        }
        .sl{
            display: inline-block;
            min-width: 80px;
        }
        .sr{
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2; /* 限制文本显示为2行 */
            overflow: hidden;
        }
        .topBox{
            position: relative;
        }
        .title{
            position: absolute;
            top: 120px;
            padding: 0 40px;
            font-size: 15px;
        }
        .sp{
            color: red;
            margin: 0 3px;
        }
        .sp1{
            display: block;
            margin-bottom: 6px;
        }
        .topImg{
            height: 225px;
        }

        /* PC端 */
        .pcTop{
            width: 100%;
            /* height: 200px; */
            background: #4680f9;
            padding-top: 10px;
        }
        .pcTopT{
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            padding: 0 20px;
            border-bottom: 1px solid #DCDFE6;
        }
        .titTxt{
            font-size: 20px;
            color: #ffffff;
        }
        .dcBtn{
            display: flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid #ffffff;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
        /* .dcBtn:hover{
            border: 2px solid #4680f9;
            color: #4680f9;
        } */
        .dcIco{
            margin-right: 3px;
        }
        .pcMain{
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .pcMainT{
            width: 100%;
            height: 70px;
            background: #4680f9;
            position: absolute;
            top: 0;
        }
        .pcMainC{
            background: #ffffff;
            width: 96%;
            flex: 1;
            overflow: auto;
            /* position: relative;
            top: -40px; */
            border-radius: 5px;
            z-index: 10;
            margin: 20px 0;
            margin-left: 2%;
            padding: 20px;
        }
        .el-table{
            font-size: 16px;
        }
        .is-leaf{
            text-align: left;
        }
        .el-table_1_column_1,.el-table_1_column_7,.el-table_1_column_9{
            text-align: center;
        }
        .el-table__header-wrapper{
            height: 36px;
        }
        .cell{
            font-size: 16px;
            color: #000000;
        }
        .el-table__row{
            height: 60px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 移动端 -->
        <!-- 顶部 -->
        <div class="topBox" v-if="isMobileType == 2">
            <img src="../images/warn/topImg2.png" alt="" style="width:100%" class="topImg">
            <div class="title">
                <span class="sp1">尊敬的客户，您好！</span>
                <span>【普查云监管】发现存在<span class="sp">{{total}}</span>条<span class="sp">首页未更新</span>问题，请及时处理。</span>
            </div>
        </div>
            
        <!-- 内容区 -->
        <div class="main" v-if="isMobileType == 2">
            <ul>
                <li v-for="(item,index) in dateList">
                    <div class="d2">
                            <span class="sl">问题类型：</span>
                            <span>{{item.type}}</span>
                        </div>
                    <!-- <div class="d1">首页超过10天未更新</div> -->
                    <div class="d2">
                        <span class="sl">问题描述：</span>
                        <span class="sr">{{item.description}}</span>
                    </div>
                    <div class="d2"> 
                        <span class="sl">发现时间：</span>
                        <span>{{item.createTime}}</span>
                    </div>
                    <div class="d3">
                        <span><img :src="item.ico" alt="" class="icon"></span>
                        <span>{{item.siteName}}</span>
                        <!-- <span v-if="item.customerType == 1">{{item.siteName}}</span>
                        <span v-else>{{item.reportingUnitName}}</span> -->
                    </div>
                </li>
            </ul>
        </div>

        <!-- PC端 -->
        <div class="pcTop" v-if="isMobileType == 1">
            <div class="pcTopT">
                <div class="titTxt">普查云监管</div>
                <div class="dcBtn" @click="ecportChange">
                    <i class="el-icon-bottom dcIco"></i>
                    <span>全部导出</span>
                </div>
            </div>
        </div>
        <div class="pcMain" v-if="isMobileType == 1">
            <div class="pcMainC">
                <el-table
                    :data="dateList"
                >   
                <el-table-column prop="index" label="序号" width="60" align="center"></el-table-column>
                <el-table-column label="问题类型"  prop="type" min-width="140"></el-table-column>
                <el-table-column label="问题描述"  prop="description" min-width="300"></el-table-column>
                <el-table-column label="发现时间"  prop="createTime" min-width="160"></el-table-column>
                <el-table-column label="平台"  prop="siteType" min-width="100"></el-table-column>
                <el-table-column label="网站名称"  prop="reportingUnitName" min-width="220">
                    <template slot-scope="scope">
                        <!-- <span v-if="scope.row.customerType == 1">{{scope.row.siteName}}</span>
                        <span v-else>{{scope.row.reportingUnitName}}</span> -->
                        <span>{{scope.row.siteName}}</span>
                    </template>
                </el-table-column>
                <el-table-column label="网站标识码"  prop="siteCode" min-width="160"></el-table-column>
                </el-table>
            </div>
            <div class="pcMainT"></div>
        </div>
    </div>
    <script>
        // 创建Vue实例
        new Vue({
            el: '#app',
            data: {
                dateList: [],
                isMobileType: null, // 1.pc端 2.移动端H5
                total: 0,
                
            },
            created () {
                this.fetchData();
                // 使用
                if (this.isMobile()) {
                    console.log('这是移动设备');
                    this.isMobileType = 2;
                } else {
                    console.log('这是PC端');
                    this.isMobileType = 1;
                }
            },
            mounted() {
                
            },
            methods: {
                isMobile() {
                    const userAgent = navigator.userAgent.toLowerCase();
                    return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent);
                },
                // 获取data参数
                getQueryParam(param) {
                    var regex = new RegExp('[?&]' + param + '(=([^&#]*)|&|#|$)');
                    var results = regex.exec(window.location.href);
                    if (!results) return null;
                    if (!results[2]) return '';
                    return decodeURIComponent(results[2].replace(/\+/g, ' '));
                },
                /** 导出*/
                // 全部导出
                ecportChange(){
                    this.ecport();
                },
                downloadFromStream(stream, filename) {
                    // 将流转换为 Blob
                    const blob = new Blob([stream], { type: 'application/octet-stream' });

                    // 创建一个临时 URL
                    const url = URL.createObjectURL(blob);

                    // 创建一个下载链接并模拟点击
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename || 'download'; // 默认文件名
                    document.body.appendChild(a);
                    a.click();

                    // 清理资源
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 0);
                },
                async ecport() {
                    let ym = null;
                    // ym = 'http://t-inspect-1.zh-hongyu.cn:80';
                    // // ym = 'http://back.puchayun.com.cn';
                    ym = window.location.protocol+window.location.host
                    var data = {
                            // "searchId":"6VvIWdUm"
                            "searchId": this.getQueryParam('id')
                        }
                    fetch('/biz/warnPageDetail/export',{
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data),
                    })
                    .then(response => response.blob())
                    .then(blob => {
                        this.downloadFromStream(blob, '首页未更新.xlsx');
                    })
                    .catch(error => console.error('下载失败:', error));
                },
                // /biz/warnPageDetail/warnRoute
                /** 源数据*/
                async fetchData() {
                    let ym = null;
                    // ym = 'http://t-inspect-1.zh-hongyu.cn:80';
                    // ym = 'http://back.puchayun.com.cn';
                    ym = window.location.protocol+window.location.host;
                    try {
                        var data = {
                            // "searchId":"6VvIWdUm"
                            "searchId": this.getQueryParam('id')

                        }
                        // const res = await fetch('http://192.168.0.4:8081/apiSnap/correction/location', {
                        const res = await fetch('/biz/warnPageDetail/list', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(data)
                        });
                        if (!res.ok) {}
                        const httpDate = await res.json();
                        this.total = httpDate.total;
                        this.dateList = httpDate.rows;
                        for(var i in this.dateList){
                            this.dateList[i].index = parseInt(i)+1;
                            // 网站icon
                            if(this.dateList[i].siteType != '网站'){
                                if(this.dateList[i].mediaType == 1){
                                    this.dateList[i].ico = '../images/warn/wx.jpeg';
                                }else if(this.dateList[i].mediaType == 2){
                                    this.dateList[i].ico = '../images/warn/wb.jpeg';
                                }else if(this.dateList[i].mediaType == 3){
                                    this.dateList[i].ico = '../images/warn/dy.jpeg';
                                }else if(this.dateList[i].mediaType == 4){
                                    this.dateList[i].ico = '../images/warn/tt.jpeg';
                                }else if(this.dateList[i].mediaType == 5){
                                    this.dateList[i].ico = '../images/warn/ks.jpeg';
                                }else {
                                    this.dateList[i].ico = '../images/warn/qt.png';
                                }
                            }else{
                                this.dateList[i].ico = '../images/warn/wzIco.png';
                            }
                        }
                        
                        
                    } catch (error) {
                        this.loading = false;
                    }
                },
            },
        
        });
    </script>
</body>
</html>
